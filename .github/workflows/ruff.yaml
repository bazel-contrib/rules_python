---
name: ruff

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v4.0.0
        with:
          # Keep in sync with .pre-commit-config.yaml
          version: 0.15.14
          args: check --extend-exclude testdata
      - uses: astral-sh/ruff-action@v4.0.0
        with:
          version: 0.15.14
          args: format --check --exclude testdata
